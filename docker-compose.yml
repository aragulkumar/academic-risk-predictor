version: "3.9"

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./ml/models:/app/ml/models
    depends_on:
      - pgbouncer

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000

  # Optional local PgBouncer connection pooler (skip if using Neon directly)
  pgbouncer:
    image: edoburu/pgbouncer
    environment:
      - DATABASE_URL=${DATABASE_URL}
    ports:
      - "5432:5432"
    profiles:
      - local-db

networks:
  default:
    driver: bridge
